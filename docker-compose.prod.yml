version: "3.9"

# 生产环境部署配置
# 使用方式：
#   docker compose -f docker-compose.prod.yml up -d
#
# 与开发版区别：
#   - 不暴露 DB/Redis 端口到宿主机（仅容器内网络通信）
#   - app 使用 --workers 4 多进程模式，不启用 --reload
#   - 增加资源限制和重启策略
#   - 日志驱动改为 json-file 并限制大小

services:
  db:
    image: postgres:15-alpine
    container_name: hvc_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-hot_video_crawler}
    # 生产环境不对外暴露端口
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-hot_video_crawler}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: hvc_redis_prod
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  app:
    image: hot_video_crawler:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hvc_app_prod
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    # 生产使用多进程，不 --reload
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
