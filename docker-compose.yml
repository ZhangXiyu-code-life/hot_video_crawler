version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: hvc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hvc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hvcpassword}
      POSTGRES_DB: ${POSTGRES_DB:-hot_video_crawler}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hvc} -d ${POSTGRES_DB:-hot_video_crawler}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hvc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hvc_app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
